name: CI - app-demo

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

permissions:
    contents: read
    packages: write
    security-events: write

jobs:
    lint-and-secrets:
        name: Lint + Secret Detection
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Gitleaks Scan detectar secrets
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.22"

            - name: Go vet
              run: go vet ./...

    tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: lint-and-secrets

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.22"

            # Valida que o codigo compila sem erros
            # Quando houver testes de verdade, voltamos com coverage
            - name: Build check
              run: go build ./...

    build-and-scan:
        name: Build + Security Scan
        runs-on: ubuntu-latest
        needs: tests

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/app-demo
                  tags: |
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Login no GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Docker buildx
              uses: docker/setup-buildx-action@v3

            # Scan no filesystem antes de buildar a imagem
            - name: Trivy - scan filesystem
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: fs
                  scan-ref: .
                  severity: CRITICAL,HIGH
                  exit-code: 1
                  format: sarif
                  output: trivy-fs.sarif

            # Build local com tag simples para o scan funcionar
            # load: true só funciona com uma tag
            - name: Docker build local
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  load: true
                  tags: app-demo:scan
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Scan na imagem local — mesma tag do build acima
            - name: Trivy - scan image
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: image
                  image-ref: app-demo:scan
                  severity: CRITICAL,HIGH
                  exit-code: 1
                  format: sarif
                  output: trivy-image.sarif

            - name: Upload resultados Trivy
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: trivy-fs.sarif

            # Push real com todas as tags — só depois que o scan passou
            - name: Docker push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    update-gitops:
        name: Update GitOps
        runs-on: ubuntu-latest
        needs: build-and-scan
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - name: Checkout GitOps repo
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.repository_owner }}/projeto-gitops
                  token: ${{ secrets.GITOPS_TOKEN }}

            - name: Instalar kustomize
              run: |
                  curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
                  sudo mv kustomize /usr/local/bin/

            - name: Extrair image tag
              id: tag
              run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            - name: Atualizar tag no dev
              run: |
                  cd manifests/overlays/dev
                  kustomize edit set image \
                    ghcr.io/${{ github.repository_owner }}/app-demo=ghcr.io/${{ github.repository_owner }}/app-demo:${{ steps.tag.outputs.tag }}

            - name: Commit e push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .
                  git commit -m "chore(dev): update app-demo to ${{ steps.tag.outputs.tag }}"
                  git push
